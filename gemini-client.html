<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Gemini API クライアント（シンプル）</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      background: #f5f5f5;
      color: #222;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #ddd;
      padding: 20px 20px 16px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 20px;
    }

    .subtitle {
      margin: 0 0 16px;
      font-size: 12px;
      color: #666;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-family: inherit;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .field {
      margin-bottom: 12px;
    }

    .helper {
      margin-top: 2px;
      font-size: 11px;
      color: #777;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row > .field {
      flex: 1;
    }

    .actions {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button {
      padding: 6px 14px;
      font-size: 14px;
      border-radius: 4px;
      border: 1px solid #1976d2;
      background: #1976d2;
      color: #fff;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .status {
      font-size: 12px;
      color: #555;
    }

    .status.error {
      color: #c62828;
    }

    .output {
      margin-top: 16px;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #ddd;
      background: #fafafa;
      min-height: 120px;
      white-space: pre-wrap;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Gemini API クライアント</h1>
    <p class="subtitle">APIキー・モデル・プロンプトを入れて、そのまま試せる簡易ツールです。</p>

    <div class="field">
      <label for="apiKey">Gemini API キー</label>
      <input id="apiKey" type="text" placeholder="AIza... で始まるキー" />
      <div class="helper">ブラウザには保存されません。ローカル検証用のキーを使ってください。</div>
    </div>

    <div class="row">
      <div class="field">
        <label for="model">モデル</label>
        <select id="model">
          <option value="models/gemini-1.5-flash">gemini-1.5-flash（速い・安い）</option>
          <option value="models/gemini-1.5-pro">gemini-1.5-pro（高品質）</option>
          <option value="models/gemini-1.0-pro">gemini-1.0-pro</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="prompt">プロンプト</label>
      <textarea id="prompt" placeholder="例: 次の文章を 3 行で要約してください。&#10;..."></textarea>
    </div>

    <div class="actions">
      <button id="sendBtn">送信</button>
      <div id="status" class="status">待機中</div>
    </div>

    <div id="output" class="output">ここにレスポンスが表示されます。</div>
  </div>

  <script>
    async function callGemini(apiKey, model, prompt) {
      const endpoint =
        "https://generativelanguage.googleapis.com/v1beta/" +
        encodeURIComponent(model) +
        ":generateContent?key=" +
        encodeURIComponent(apiKey);

      const body = {
        contents: [
          {
            role: "user",
            parts: [{ text: prompt }],
          },
        ],
      };

      const res = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json; charset=utf-8" },
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const text = await res.text().catch(() => "");
        throw new Error("HTTP " + res.status + " " + res.statusText + "\n" + text);
      }

      const data = await res.json();
      const candidate = data.candidates && data.candidates[0];
      const parts = (candidate && candidate.content && candidate.content.parts) || [];
      const text = parts.map((p) => p.text || "").join("\n").trim();

      return text || JSON.stringify(data, null, 2);
    }

    (function init() {
      const apiKeyEl = document.getElementById("apiKey");
      const modelEl = document.getElementById("model");
      const promptEl = document.getElementById("prompt");
      const sendBtn = document.getElementById("sendBtn");
      const statusEl = document.getElementById("status");
      const outputEl = document.getElementById("output");

      function setStatus(text, isError) {
        statusEl.textContent = text;
        statusEl.classList.toggle("error", !!isError);
      }

      sendBtn.addEventListener("click", async () => {
        const apiKey = apiKeyEl.value.trim();
        const model = modelEl.value;
        const prompt = promptEl.value.trim();

        if (!apiKey) {
          alert("Gemini API キーを入力してください。");
          apiKeyEl.focus();
          return;
        }
        if (!prompt) {
          alert("プロンプトを入力してください。");
          promptEl.focus();
          return;
        }

        sendBtn.disabled = true;
        setStatus("送信中…", false);
        outputEl.textContent = "リクエスト送信中です。少々お待ちください。";

        try {
          const text = await callGemini(apiKey, model, prompt);
          outputEl.textContent = text;
          setStatus("完了", false);
        } catch (e) {
          console.error(e);
          outputEl.textContent =
            "エラーが発生しました:\n\n" + (e && e.message ? e.message : String(e));
          setStatus("エラー", true);
        } finally {
          sendBtn.disabled = false;
        }
      });

      // Ctrl+Enter で送信
      promptEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
          sendBtn.click();
        }
      });
    })();
  </script>
</body>
</html>
